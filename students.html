{% extends "base_admin.html" %}
{% block content %}

<h2>Student List</h2>

<table border="1" cellpadding="10" style="width:100%; background:white;">
    <tr style="background:#1f2933; color:white;">
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Branch</th>
        <th>Username</th>
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td>{{ student[4] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
