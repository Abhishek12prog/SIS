{% extends "base_admin.html" %}

{% block content %}

<h2>Student Details</h2>

<table border="1" cellpadding="10">

<tr><th>ID</th><td>{{ student[0] }}</td></tr>
<tr><th>Name</th><td>{{ student[1] }}</td></tr>
<tr><th>Email</th><td>{{ student[2] }}</td></tr>
<tr><th>Branch</th><td>{{ student[3] }}</td></tr>
<tr><th>Username</th><td>{{ student[4] }}</td></tr>
<tr><th>Year</th><td>{{ student[6] }}</td></tr>
<tr><th>Semester</th><td>{{ student[7] }}</td></tr>
<tr><th>Course</th><td>{{ student[9] }}</td></tr>
<tr><th>Phone</th><td>{{ student[10] }}</td></tr>

</table>

{% endblock %}
