{% extends "base_admin.html" %}
{% block content %}
<form method="GET" style="margin-bottom: 20px;">
    <input 
        type="text" 
        name="search" 
        placeholder="Search by name or username..."
        style="padding:8px; width:250px;"
    >
    <button type="submit">Search</button>
</form>
<h2>Student List</h2>

<table border="1" cellpadding="10" style="width:100%; background:white;">
    
    <tr style="background:#1f2933; color:white;">
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Branch</th>
        <th>Username</th>
        <th>Actions</th>  <!-- NEW -->
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student[0] }}</td>  <!-- ID -->
        <td>{{ student[1] }}</td>
        <td>{{ student[2] }}</td>
        <td>{{ student[3] }}</td>
        <td>{{ student[4] }}</td>

        <!-- 🔥 ACTION BUTTONS -->
        <td>
            <a href="{{ url_for('view_student', student_id=student[0]) }}">👁 View</a> |
            <a href="{{ url_for('edit_student', student_id=student[0]) }}">✏ Edit</a> |
            <a href="{{ url_for('delete_student', student_id=student[0]) }}" 
               onclick="return confirm('Are you sure?')">❌ Delete</a>
        </td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
