<!DOCTYPE html>
<html>
<head>
    <title>IFHE Login Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1f2933, #2f3e4e);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: #ffffff;
            width: 380px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .login-container img {
            height: 42px;   /* Reduced logo size */
            width: auto;
            margin-bottom: 15px;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 15px 0 25px 0;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #2f3e4e;
            font-weight: 600;
            font-size: 20px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .admin-btn {
            background-color: #2f3e4e;
            color: white;
        }

        .admin-btn:hover {
            background-color: #1b252f;
            transform: translateY(-2px);
        }

        .student-btn {
            background-color: #4a90e2;
            color: white;
        }

        .student-btn:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: gray;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="login-container">

    <!-- Logo -->
    <img src="{{ url_for('static', filename='images/ifhe-Logo.svg') }}" alt="IFHE Logo">

    <div class="divider"></div>

    <h2>Student Information System</h2>

    <a href="{{ url_for('admin_login') }}">
        <button class="btn admin-btn">Admin Login</button>
    </a>

    <a href="{{ url_for('student_login') }}">
        <button class="btn student-btn">Student Login</button>
    </a>

    <div class="footer">
        © IFHE | Secure Login Portal
    </div>

</div>

</body>
</html>
