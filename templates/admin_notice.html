{% extends "base_admin.html" %}

{% block content %}

<style>
    .notice-container {
        padding: 20px;
    }

    .notice-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }

    .notice-title {
        font-size: 24px;
        font-weight: bold;
        color: #1f2933;
    }

    .add-btn {
        background: #2563eb;
        color: white;
        padding: 8px 14px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
    }

    .add-btn:hover {
        background: #1e40af;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 12px;
        text-align: center;
    }

    th {
        background: #1f2933;
        color: white;
        font-weight: 500;
    }

    tr:nth-child(even) {
        background: #f4f6f9;
    }

    tr:hover {
        background: #e5e7eb;
    }
</style>

<div class="notice-container">

    <div class="notice-header">
        <div class="notice-title">📢 Notice Board (Admin)</div>
        <a href="{{ url_for('add_notice') }}" class="add-btn">➕ Add Notice</a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Date</th>
        </tr>

        {% for n in notices %}
        <tr>
            <td>{{ n[0] }}</td>
            <td>{{ n[1] }}</td>
            <td>{{ n[2] }}</td>
            <td>{{ n[4] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

{% endblock %}
